name: tdrd
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.10
  - pip:
    # Geospatial
    - rasterio==1.3.9
    - geopandas==0.14.3
    - shapely==2.0.4
    - pyproj==3.6.1
    - osmnx==1.9.3
    - networkx==3.2.1

    # Satellite data access
    - sentinelsat==1.2.1
    - pystac-client==0.7.7
    - planetary-computer==1.0.0

    # Image processing
    - opencv-python==4.9.0.80
    - scikit-image==0.22.0
    - numpy==1.26.4

    # Networking / async
    - httpx==0.27.0

    # Utilities
    - tqdm
    - requests
    - python-dotenv
    - jsonlines
    - pandas
